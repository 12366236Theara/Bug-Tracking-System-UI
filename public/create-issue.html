<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Bug - Bug Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo d-flex align-items-center">
            <i class="bi bi-bug-fill text-primary fs-3 me-2"></i>
            <span class="fw-bold fs-5">Bug Tracker</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <a href="projects.html" class="sidebar-link">
                <i class="bi bi-folder"></i>
                <span>Projects</span>
            </a>
            <a href="issues.html" class="sidebar-link active">
                <i class="bi bi-bug"></i>
                <span>Issues</span>
            </a>
            <a href="my-tasks.html" class="sidebar-link">
                <i class="bi bi-check-square"></i>
                <span>My Tasks</span>
            </a>
            <a href="reports.html" class="sidebar-link">
                <i class="bi bi-bar-chart"></i>
                <span>Reports</span>
            </a>
            <a href="users.html" class="sidebar-link">
                <i class="bi bi-people"></i>
                <span>Users</span>
            </a>
            <a href="settings.html" class="sidebar-link">
                <i class="bi bi-gear"></i>
                <span>Settings</span>
            </a>
        </nav>
    </div>

    <!-- Top Navbar -->
    <nav class="top-navbar d-flex align-items-center px-4" id="topNavbar">
        <button class="btn btn-light me-3" id="sidebarToggle">
            <i class="bi bi-list fs-5"></i>
        </button>
        <div class="ms-auto d-flex align-items-center gap-3">
            <button class="btn btn-light position-relative">
                <i class="bi bi-bell fs-5"></i>
                <span class="notification-badge"></span>
            </button>
            <div class="d-flex align-items-center gap-2 border-start ps-3">
                <div class="avatar">JD</div>
                <a href="login.html" class="btn btn-light">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="container-fluid">
            <a href="issues.html" class="text-decoration-none text-muted mb-3 d-inline-block">
                <i class="bi bi-arrow-left me-2"></i>Back to Issues
            </a>

            <div class="mb-4">
                <h1 class="h3 fw-bold mb-1">Report New Bug</h1>
                <p class="text-muted mb-0">Provide detailed information about the issue</p>
            </div>

            <form>
                <!-- Basic Information -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title fw-semibold mb-4">Basic Information</h5>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Title <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" placeholder="Brief description of the issue" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description <span class="text-danger">*</span></label>
                                <textarea class="form-control" rows="4" placeholder="Detailed description of the issue" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Project <span class="text-danger">*</span></label>
                                <select class="form-select" required>
                                    <option value="">Select Project</option>
                                    <option>Web Portal</option>
                                    <option>Backend API</option>
                                    <option>Mobile App</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Assign To</label>
                                <select class="form-select">
                                    <option>Unassigned</option>
                                    <option>John Doe</option>
                                    <option>Alice Johnson</option>
                                    <option>Bob Smith</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Priority <span class="text-danger">*</span></label>
                                <select class="form-select" required>
                                    <option value="">Select Priority</option>
                                    <option>Critical</option>
                                    <option>High</option>
                                    <option>Medium</option>
                                    <option>Low</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Severity <span class="text-danger">*</span></label>
                                <select class="form-select" required>
                                    <option value="">Select Severity</option>
                                    <option>Blocker</option>
                                    <option>Major</option>
                                    <option>Minor</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Due Date</label>
                                <input type="date" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Reproduction Details -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title fw-semibold mb-4">Reproduction Details</h5>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Steps to Reproduce <span class="text-danger">*</span></label>
                                <textarea class="form-control" rows="5" placeholder="1. Go to login page&#10;2. Enter credentials&#10;3. Click submit button&#10;4. Observe the error" required></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Expected Result <span class="text-danger">*</span></label>
                                <textarea class="form-control" rows="3" placeholder="What should happen when the steps are followed" required></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Actual Result <span class="text-danger">*</span></label>
                                <textarea class="form-control" rows="3" placeholder="What actually happens (the bug)" required></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Attachments -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title fw-semibold mb-4">Attachments</h5>
                        <div class="upload-area">
                            <i class="bi bi-cloud-upload fs-1 text-muted mb-2"></i>
                            <p class="mb-1 fw-medium">Click to upload files</p>
                            <p class="text-muted small mb-0">Screenshots, logs, or screen recordings</p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex gap-3">
                    <a href="issues.html" class="btn btn-secondary flex-fill">Cancel</a>
                    <button type="submit" class="btn btn-primary flex-fill">Submit Bug Report</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Bug report submitted successfully!');
            window.location.href = 'issues.html';
        });
    </script>
</body>
</html>
