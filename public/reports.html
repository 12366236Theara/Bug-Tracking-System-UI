<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Bug Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo d-flex align-items-center">
            <i class="bi bi-bug-fill text-primary fs-3 me-2"></i>
            <span class="fw-bold fs-5">Bug Tracker</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
            <a href="projects.html" class="sidebar-link"><i class="bi bi-folder"></i><span>Projects</span></a>
            <a href="issues.html" class="sidebar-link"><i class="bi bi-bug"></i><span>Issues</span></a>
            <a href="my-tasks.html" class="sidebar-link"><i class="bi bi-check-square"></i><span>My Tasks</span></a>
            <a href="reports.html" class="sidebar-link active"><i class="bi bi-bar-chart"></i><span>Reports</span></a>
            <a href="users.html" class="sidebar-link"><i class="bi bi-people"></i><span>Users</span></a>
            <a href="settings.html" class="sidebar-link"><i class="bi bi-gear"></i><span>Settings</span></a>
        </nav>
    </div>
    <nav class="top-navbar d-flex align-items-center px-4" id="topNavbar">
        <button class="btn btn-light me-3" id="sidebarToggle"><i class="bi bi-list fs-5"></i></button>
        <div class="ms-auto d-flex align-items-center gap-3">
            <button class="btn btn-light position-relative"><i class="bi bi-bell fs-5"></i><span class="notification-badge"></span></button>
            <div class="d-flex align-items-center gap-2 border-start ps-3">
                <div class="avatar">JD</div>
                <a href="login.html" class="btn btn-light"><i class="bi bi-box-arrow-right"></i></a>
            </div>
        </div>
    </nav>
    <main class="main-content" id="mainContent">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 fw-bold mb-1">Reports</h1>
                    <p class="text-muted mb-0">Analytics and insights for bug tracking</p>
                </div>
                <button class="btn btn-primary"><i class="bi bi-download me-2"></i>Export Report</button>
            </div>
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small">Date Range</label>
                            <select class="form-select">
                                <option>Last 7 days</option>
                                <option>Last 30 days</option>
                                <option>Last 3 months</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small">Project</label>
                            <select class="form-select">
                                <option>All Projects</option>
                                <option>Web Portal</option>
                                <option>Backend API</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small">Report Type</label>
                            <select class="form-select">
                                <option>Overview</option>
                                <option>Bug Status</option>
                                <option>Developer Performance</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="text-muted small mb-2">Total Bugs Reported</h6>
                            <div class="d-flex justify-content-between align-items-end">
                                <h3 class="mb-0">248</h3>
                                <span class="badge bg-success">+12%</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="text-muted small mb-2">Resolution Rate</h6>
                            <div class="d-flex justify-content-between align-items-end">
                                <h3 class="mb-0">74%</h3>
                                <span class="badge bg-success">+5%</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="text-muted small mb-2">Avg. Resolution Time</h6>
                            <div class="d-flex justify-content-between align-items-end">
                                <h3 class="mb-0">3.2d</h3>
                                <span class="badge bg-success">-0.8d</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="text-muted small mb-2">Critical Bugs</h6>
                            <div class="d-flex justify-content-between align-items-end">
                                <h3 class="mb-0">12</h3>
                                <span class="badge bg-success">-3</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="fw-semibold mb-3">Export Options</h5>
                    <div class="d-flex gap-3">
                        <button class="btn btn-danger"><i class="bi bi-file-pdf me-2"></i>Export as PDF</button>
                        <button class="btn btn-success"><i class="bi bi-file-excel me-2"></i>Export as Excel</button>
                        <button class="btn btn-primary"><i class="bi bi-file-text me-2"></i>Export as CSV</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
